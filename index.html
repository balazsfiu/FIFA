<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BL Döntő Pro+ Ultimate Ráadás</title>
<style>
body{background:#0b0f14;color:white;font-family:Arial;margin:0;padding:20px}
.scoreboard{background:#111;border:2px solid #444;padding:15px;text-align:center;font-size:32px;border-radius:12px;margin-bottom:15px}
.controls button,.player button{margin:2px}
.container{display:flex;gap:15px;flex-wrap:wrap}
.team,.events{
 background:#1a1f27;
 padding:10px;
 border-radius:10px;
 flex:1;
 min-width:280px;
}
.player{background:#2a303a;padding:8px;margin:5px 0;border-radius:8px}
.goalmark{background:#145a14}
.yellowmark{outline:2px solid gold}
.redout{text-decoration:line-through;color:#ff4d4d}
.injured{text-decoration:line-through;color:orange}
.subbed{text-decoration:line-through;color:#aaa}
.event-goal{color:#5cff5c}
.event-yellow{color:gold}
.event-red{color:#ff5c5c}
.event-var{color:#d18cff}
.event-sub{color:#7ec8ff}
.event-injury{color:orange}
.event-offside{color:#00e5ff}
#log{max-height:600px;overflow:auto}

@media (max-width:700px){

 .container{
   flex-direction:column;
 }

 .player button,
 .controls button{
   padding:8px;
   font-size:16px;
 }

 .scoreboard{
   font-size:24px;
 }
}
</style>
</head>
<body>

<div class="scoreboard">
Luxemburg <span id="as">0</span> - <span id="ps">0</span> Italy 
<br><small>Perc: <span id="min">0</span></small><br><small id="pens" style="display:none">⚽ Büntetők: <span id="ap">0</span> - <span id="pp">0</span></small>
</div>

<div class="controls">
<button onclick="nextMinute()">+1 perc</button>
<button onclick="minute=Math.max(0,minute-1);upd()">-1 perc</button>

<button onclick="phase('1. félidő kezdődik')">1. félidő</button>
<button onclick="startAddedTime(45)">Félidő ráadás</button>
<button onclick="endHalf()">Félidő vége</button>
<button onclick="phase('2. félidő')">2. félidő</button>
<button onclick="startAddedTime(90)">Második félidő ráadás</button>
<button onclick="endSecondHalf()">Második félidő vége</button>

<button onclick="phase('Hosszabbítás')">Hosszabbítás</button>
<button onclick="startAddedTime(105)">Első hosszabbítás ráadás</button>
<button onclick="endFirstExtra()">Első hosszabbítás vége</button>
<button onclick="startSecondExtra()">Második hosszabbítás</button>
<button onclick="startAddedTime(120)">Második hosszabbítás ráadás</button>
<button onclick="endSecondExtra()">Második hosszabbítás vége</button>
<button onclick="startPenalties()">Büntetőpárbaj</button>

<button onclick="undoLast()">↩️ Visszavonás</button>
<button onclick="newMatch()">Új meccs</button>
<button onclick="exportTxt()">Jegyzőkönyv TXT</button>
</div>

<div class="container">
<div class="team"><h2>Arsenal</h2><div id="ars"></div></div>
<div class="team"><h2>PSG</h2><div id="psg"></div></div>

<div class="events">
<h2>Eseménynapló</h2>
<div>
<button onclick="varEvent('VAR vizsgálat')">VAR</button>
<button onclick="varEvent('VAR: gól megadva')">VAR gól ✔</button>
<button onclick="varEvent('VAR: gól érvénytelenítve')">VAR gól ✖</button>
<button onclick="varEvent('VAR: büntető megadva')">VAR tizi ✔</button>
<button onclick="varEvent('VAR: büntető visszavonva')">VAR tizi ✖</button>
<button onclick="varEvent('VAR: piros lap megerősítve')">VAR piros ✔</button>
<button onclick="varEvent('VAR: piros lap visszavonva')">VAR piros ✖</button>
</div>
<div id="log"></div>
</div>
</div>

<script>
let minute=0,arsScore=0,psgScore=0,arsSubs=0,psgSubs=0;
let penaltyMode=false,arsPens=0,psgPens=0;
let history=[];
let addedTimeBase=null,addedTimeCurrent=0,addedTimeMax=0;

function saveState(){history.push({minute,arsScore,psgScore,log:log.innerHTML});}

function upd(){
 if(addedTimeBase!==null) min.textContent=addedTimeBase+"+"+addedTimeCurrent;
 else min.textContent=minute;
 as.textContent=arsScore;
 ps.textContent=psgScore;
 save();
}

function addLog(txt,cls=""){
 saveState();
 log.innerHTML=`<div class="${cls}">${min.textContent}' ${txt}</div>`+log.innerHTML;
 save();
}

function phase(t){

 if(t=="2. félidő"){
   minute=46;
   addedTimeBase=null;
   addedTimeCurrent=0;
   addedTimeMax=0;
 }

 if(t=="Hosszabbítás"){
   minute=91;
   addedTimeBase=null;
   addedTimeCurrent=0;
   addedTimeMax=0;
 }

 addLog(t,"event-var");
 upd();
}

function varEvent(t){
 const note=prompt("Megjegyzés (nem kötelező):","");
 if(note && note.trim()!=="") addLog(t+" | "+note,"event-var");
 else addLog(t,"event-var");
}

function startAddedTime(base){
 let extra=parseInt(prompt("Hány perc ráadás?","3"));
 if(isNaN(extra)) return;
 addedTimeBase=base;
 addedTimeCurrent=0;
 addedTimeMax=extra;
 addLog("+"+extra+" perc ráadás","event-var");
 upd();
}

function nextMinute(){
 if(addedTimeBase!==null){
   if(addedTimeCurrent<addedTimeMax) addedTimeCurrent++;
 } else minute++;
 upd();
}

function endHalf(){

 addLog("Félidő vége","event-var");

 if(minute < 46){
   minute = 45;
 }else{
   minute = 90;
 }

 addedTimeBase=null;
 addedTimeCurrent=0;
 addedTimeMax=0;

 upd();
}


function endSecondHalf(){
 addLog("Második félidő vége","event-var");
 minute=90;
 addedTimeBase=null;
 addedTimeCurrent=0;
 addedTimeMax=0;
 upd();
}

function endMatch(){
 addLog("Mérkőzés vége","event-var");
}

function undoLast(){
 if(history.length===0) return alert("Nincs visszavonható esemény!");
 const s=history.pop();
 minute=s.minute;
 arsScore=s.arsScore;
 psgScore=s.psgScore;
 log.innerHTML=s.log;
 upd();
}

function endFirstExtra(){

 addLog("Első hosszabbítás vége","event-var");

 minute=105;

 addedTimeBase=null;
 addedTimeCurrent=0;
 addedTimeMax=0;

 upd();
}

function endSecondExtra(){

 addLog("Második hosszabbítás vége","event-var");

 minute=120;

 addedTimeBase=null;
 addedTimeCurrent=0;
 addedTimeMax=0;

 upd();
}

function endSecondHalf(){
 addLog("Második félidő vége","event-var");
 minute=90;
 addedTimeBase=null;
 addedTimeCurrent=0;
 addedTimeMax=0;
 upd();
}

function startSecondExtra(){
 addLog("Második hosszabbítás kezdődik","event-var");
 minute=106;
 addedTimeBase=null;
 addedTimeCurrent=0;
 addedTimeMax=0;
 upd();
}

const arsBench=["Curci A. (#9)", "Duarte D. (#4)", "Duarte E. (#22)", "Fox L. (#23)", "Goncalves M. (#16)", "Kadamani H. (#20)", "Mahmutovic E. (#3)", "Muratovic E. (#11)", "Pereira Cardoso T. (#12)", "Selimovic V. (#5)", "Thill S. (#21)", "Veiga E. (#14)"];
const benchCards={};
const psgBench=["Ahanor H. (#24)", "Berti T. (#14)", "Camarda F. (#8)", "Daffara G. (#12)", "Dagasso M. (#20)", "Ekhator J. (#18)", "Faticanti G. (#16)", "Fini S. (#17)", "Fortini N. (#25)", "Inacio S. (#19)", "Mane F. (#6)", "Palestra M. (#2)", "Palmisani L. (#23)", "Reggiani L. (#13)"];

function player(name,team,bench,parent){

 let currentPlayer=name;
 let yellows=0;

 const d=document.createElement("div");
 d.className="player";

 d.innerHTML=`
 <span class="nm">${name}</span><br>
 <button>⚽</button>
 <button>🥅</button>
 <button>🎯 ÖG</button>
 <button>🟨</button>
 <button>🟥</button>
 <button>🚩 Les</button>
 <button>🤕</button>
 <button>🔄</button>
 <div class="extra"></div>
 `;

 const nm=d.querySelector(".nm");
 const b=d.querySelectorAll("button");

 b[0].onclick=()=>{
  if(penaltyMode){
    if(team=="A"){arsPens++; ap.textContent=arsPens;}
    else{psgPens++; pp.textContent=psgPens;}
    nm.style.color="lime";
    addLog(currentPlayer+" értékesítette a büntetőt","event-goal");
    return;
  }
  arsScore+=team=="A";
  psgScore+=team=="P";
  nm.classList.add("goalmark");
  addLog(currentPlayer+" gólt szerzett","event-goal");
  upd();
 };

 b[1].onclick=()=>{
  if(penaltyMode){
    nm.style.color="red";
    addLog(currentPlayer+" kihagyta a büntetőt","event-red");
    return;
  }
  arsScore+=team=="A";
  psgScore+=team=="P";
  addLog(currentPlayer+" büntetőből gólt szerzett","event-goal");
  upd();
 };

 b[2].onclick=()=>{
  psgScore+=team=="A";
  arsScore+=team=="P";
  addLog(currentPlayer+" öngólt szerzett","event-goal");
  upd();
 };

b[3].onclick=()=>{
  yellows++;

  if(!benchCards[currentPlayer]){
     benchCards[currentPlayer]={y:0,red:false};
  }

  benchCards[currentPlayer].y=yellows;

  nm.classList.add("yellowmark");

  addLog(currentPlayer+" sárga lap","event-yellow");

  if(yellows>=2){
     nm.classList.add("redout");

     benchCards[currentPlayer].red=true;

     addLog(currentPlayer+" második sárga után kiállítva","event-red");
  }
};

b[4].onclick=()=>{
  nm.classList.add("redout");

  if(!benchCards[currentPlayer]){
     benchCards[currentPlayer]={y:0,red:false};
  }

  benchCards[currentPlayer].red=true;

  addLog(currentPlayer+" piros lap","event-red");
};

 b[5].onclick=()=>{
  addLog(currentPlayer+" lesen volt","event-offside");
 };

 b[6].onclick=()=>{
  nm.classList.add("injured");
  addLog(currentPlayer+" megsérült","event-injury");
 };

 b[7].onclick=()=>{

    if(nm.classList.contains("redout")){
    alert("A kiállított játékos nem cserélhető le!");
    return;
  }

  if(bench.length===0){
    alert("Nincs több cserejátékos!");
    return;
  }

  let s=document.createElement("select");
  bench.forEach(x=>s.add(new Option(x,x)));

  let ok=document.createElement("button");
  ok.textContent="OK";

  d.querySelector(".extra").append(s,ok);

  ok.onclick=()=>{

   let newPlayer=s.value;

   bench.splice(bench.indexOf(newPlayer),1);

   const oldPlayer=currentPlayer;

   currentPlayer=newPlayer;
    if(team=="A") arsSubs++;
  if(team=="P") psgSubs++;
   yellows=0;

   nm.textContent=currentPlayer;

   nm.classList.remove(
    "goalmark",
    "yellowmark",
    "redout",
    "injured",
    "subbed"
   );

   const st=benchCards[currentPlayer];
   if(st){
      yellows=st.y||0;
      if(st.y>0) nm.classList.add("yellowmark");
      if(st.red) nm.classList.add("redout");
   }

addLog(
 currentPlayer+" beállt "+oldPlayer+" helyére ("+
 (team=="A" ? "Arsenal: "+arsSubs : "PSG: "+psgSubs)
 +" csere)",
 "event-sub"
);
   d.querySelector(".extra").innerHTML="";
  };
 };

 parent.appendChild(d);
}



function staffMember(name,parent){
 if(!benchCards[name]) benchCards[name]={y:0,red:false};
 const d=document.createElement("div");
 d.className="player";
 d.innerHTML=`
 <span class="nm">${name}</span><br>
 <button>🟨</button>
 <button>🟥</button>
 `;

 const nm=d.querySelector(".nm");
 const b=d.querySelectorAll("button");
 let yellows=0;

 b[0].onclick=()=>{
   yellows++;
   benchCards[name].y=yellows;
   nm.classList.add("yellowmark");
   addLog(name+" sárga lap","event-yellow");
   if(yellows>=2){
      nm.classList.add("redout"); benchCards[name].red=true;
      addLog(name+" második sárga után kiállítva","event-red");
   }
 };

 b[1].onclick=()=>{
   nm.classList.add("redout"); benchCards[name].red=true;
   addLog(name+" piros lap","event-red");
 };

 parent.appendChild(d);
}

function startPenalties(){
 penaltyMode=true;
 document.getElementById("pens").style.display="inline";
 addLog("Büntetőpárbaj kezdődik","event-var");
 document.querySelectorAll(".player").forEach(p=>{
   const buttons=p.querySelectorAll("button");
   buttons.forEach((b,i)=>{
      if(i>1) b.style.display="none";
   });
   buttons[0].textContent="✅ Belőtte";
   buttons[1].textContent="❌ Kihagyta";
 });
}

["Moris (#1)", "Korac (#2)", "Mica Pinto (#17)", "Carlson (#13)", "Bohnert (#7)", "de Sousa (#6)", "Olesen (#19)", "Niani (#10)", "Martins (#8)", "Jans (#18)", "Thill (#15)"].forEach(x=>player(x,"A",arsBench,ars));
["Donarumma (#1)","Favasuli (#22)", "Pisilli (#21)", "Cherubini (#7)", "Comuzzo (#15)", "Lipani (#5)", "Esposito (#9)", "Chiarodia (#4)", "Ndour (#10)", "Koleosho (#11)", "Bartesaghi (#3)"].forEach(x=>player(x,"P",psgBench,psg));


const arsMgr=document.createElement("h3"); arsMgr.textContent="Manager";
ars.appendChild(arsMgr);
staffMember("Jeff Strasser",ars);

const arsBenchTitle=document.createElement("h3"); arsBenchTitle.textContent="Cserejátékosok";
ars.appendChild(arsBenchTitle);
arsBench.forEach(x=>staffMember(x,ars));

const psgMgr=document.createElement("h3"); psgMgr.textContent="Manager";
psg.appendChild(psgMgr);
staffMember("Silvio Baldini",psg);

const psgBenchTitle=document.createElement("h3"); psgBenchTitle.textContent="Cserejátékosok";
psg.appendChild(psgBenchTitle);
psgBench.forEach(x=>staffMember(x,psg));


function exportTxt(){const blob=new Blob([log.innerText],{type:"text/plain"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="jegyzokonyv.txt";a.click();}
function newMatch(){if(confirm("Új meccs?")){localStorage.clear();location.reload();}}
function save(){localStorage.setItem("blpro",JSON.stringify({log:log.innerHTML,m:minute,a:arsScore,p:psgScore}));}
upd();
</script>
</body>
</html>
